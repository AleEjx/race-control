<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0c0c10;
      --surface: #13131a;
      --border:  #1f1f2e;
      --text:    #e8e8f0;
      --muted:   #50506a;
      --green:   #00e676;
      --yellow:  #ffd600;
      --red:     #ff1744;
      --blue:    #2979ff;
      --orange:  #ff6d00;
      --white:   #ffffff;
      --discord: #5865F2;
      --radius:  5px;
    }
    html, body {
      background: var(--bg);
      width: 100%; height: 100%;
      overflow: hidden; margin: 0; padding: 0;
      font-family: 'Oxanium', sans-serif;
      color: var(--text);
    }

    /* ── Login ── */
    #login-discord {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 20px;
      background: var(--bg);
    }
    .logo { font-size: 22px; font-weight: 900; text-transform: uppercase; color: #fff; letter-spacing: 1px; }
    .logo span { color: var(--red); }
    .login-sub { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .discord-btn {
      display: flex; align-items: center; gap: 10px;
      background: var(--discord); color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; border: none;
      padding: 11px 20px; border-radius: var(--radius);
      cursor: pointer; transition: opacity 0.15s; width: 100%;
      justify-content: center;
    }
    .discord-btn:hover { opacity: 0.85; }
    .discord-btn svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }
    .login-error { color: var(--red); font-size: 10px; min-height: 14px; text-align: center; letter-spacing: 0.5px; }

    /* ── Widget ── */
    #widget {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; background: var(--bg);
      border: none; border-radius: 0;
      overflow-y: auto; overflow-x: hidden;
    }
    #widget.collapsed .widget-body { display: none; }

    .widget-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; background: var(--surface);
      border-bottom: 1px solid var(--border); gap: 8px;
    }
    .widget-header-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .widget-logo { font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .widget-logo span { color: var(--red); }
    .user-pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 10px; white-space: nowrap;
    }
    .user-avatar {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--discord); flex-shrink: 0;
      object-fit: cover;
    }
    .status-pill { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
    .status-dot.live { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .widget-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .ctrl-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 3px 5px; border-radius: 3px; font-size: 13px; line-height: 1; transition: color 0.15s, background 0.15s; display: flex; align-items: center; }
    .ctrl-btn:hover { color: var(--text); background: var(--border); }

    .widget-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .section-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .flag-grid { display: grid; gap: 5px; }
    .flag-grid.cols-2 { grid-template-columns: 1fr 1fr; }

    .flag-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; padding: 8px 4px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: transform 0.1s, border-color 0.15s;
      color: var(--text); -webkit-tap-highlight-color: transparent;
    }
    .flag-btn:active { transform: scale(0.93); }
    .flag-btn .fi { font-size: 16px; line-height: 1; }
    .flag-btn .fn { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; text-align: center; line-height: 1.2; }
    .flag-btn.green:hover  { border-color: var(--green);  background: rgba(0,230,118,0.08); }
    .flag-btn.yellow:hover { border-color: var(--yellow); background: rgba(255,214,0,0.08); }
    .flag-btn.red:hover    { border-color: var(--red);    background: rgba(255,23,68,0.08); }
    .flag-btn.blue:hover   { border-color: var(--blue);   background: rgba(41,121,255,0.08); }
    .flag-btn.orange:hover { border-color: var(--orange); background: rgba(255,109,0,0.08); }
    .flag-btn.white:hover  { border-color: var(--white);  background: rgba(255,255,255,0.05); }
    .flag-btn.vc-join:hover  { border-color: var(--green); background: rgba(0,230,118,0.08); }
    .flag-btn.vc-leave:hover { border-color: var(--red);   background: rgba(255,23,68,0.08); }
    .flag-btn.firing { animation: pop 0.25s ease; }
    @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(0.88)} 100%{transform:scale(1)} }

    .divider { height: 1px; background: var(--border); }

    #disabled-banner {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; padding: 14px 10px;
      background: rgba(255,23,68,0.08); border: 1px solid rgba(255,23,68,0.3);
      border-radius: 5px; text-align: center;
    }
    #disabled-banner .err-title { font-size: 13px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; color: #ff1744; }
    #disabled-banner .err-body  { font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; line-height: 1.4; }

    #join-result {
      display: none; position: fixed; bottom: 50px; left: 50%;
      transform: translateX(-50%);
      background: rgba(12,12,20,0.97); border: 1px solid #00e676; color: #00e676;
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      padding: 10px 16px; border-radius: 8px;
      white-space: pre; z-index: 998; pointer-events: none; text-align: center;
    }

    #cooldown-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--border);
      z-index: 1000;
    }
    #cooldown-fill {
      height: 100%;
      background: var(--red);
      width: 100%;
    }

    #toast {
      position: fixed; bottom: 10px; left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 12px; font-weight: 600;
      letter-spacing: 1px; padding: 7px 16px; border-radius: 20px;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
      opacity: 0; white-space: nowrap; z-index: 999; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red); }
  </style>
</head>
<body>

<!-- ── Step 1: Discord login ── -->
<div id="login-discord">
  <div class="logo">Race<span>Control</span></div>
  <div class="login-sub">Marshalling System</div>
  <button class="discord-btn" onclick="loginWithDiscord()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Login with Discord
  </button>
  <div class="login-error" id="login-error"></div>
</div>

<!-- ── Step 2: Password ── -->
<div id="login-password" style="display:none;position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;background:var(--bg);">
  <div class="logo">Race<span>Control</span></div>
  <div id="login-user-info" style="display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);padding:8px 14px;border-radius:20px;">
    <img id="login-avatar" src="" style="width:24px;height:24px;border-radius:50%;" />
    <span id="login-username" style="font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green);"></span>
    <span style="font-size:10px;color:var(--muted);">✓ Verified</span>
  </div>
  <input type="password" id="pw" placeholder="Enter password" style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:9px 12px;border-radius:var(--radius);outline:none;" />
  <button class="discord-btn" style="background:var(--red);" onclick="submitPassword()">Enter</button>
  <div class="login-error" id="pw-error"></div>
</div>

<!-- ── Blacklisted screen ── -->
<div id="login-blacklisted" style="display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;background:var(--bg);">
  <div style="width:100%;max-width:340px;background:rgba(120,0,0,0.15);border:1.5px solid #ff1744;border-radius:10px;box-shadow:0 0 24px rgba(255,23,68,0.25),0 0 60px rgba(255,23,68,0.08);padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;">
    <div style="font-size:28px;line-height:1;"></div>
    <div style="font-family:'Oxanium',sans-serif;font-size:20px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#ff1744;">🚫 Blacklisted 🚫</div>
    <div style="font-family:'Oxanium',sans-serif;font-size:12px;color:rgba(255,255,255,0.6);line-height:1.6;">
      Hello <span id="blacklisted-username" style="color:#fff;font-weight:700;"></span>, you have been blacklisted from the Race Control panel.
    </div>
    <div style="width:100%;height:1px;background:rgba(255,23,68,0.25);"></div>
    <a href="https://discord.com/channels/1464788232263700687/1464969879332454551/1501393292313624586" target="_blank" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:#5865F2;color:#fff;font-family:'Oxanium',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-decoration:none;padding:11px 16px;border-radius:5px;transition:opacity 0.15s;" onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      Appeal here
    </a>
  </div>
</div>

<!-- ── Widget ── -->
<div id="widget">
  <div class="widget-header">
    <div class="widget-header-left">
      <div class="widget-logo">Race<span>Control</span></div>
      <div class="user-pill">
        <img class="user-avatar" id="user-avatar" src="" alt="" />
        <span id="user-name">–</span>
      </div>
      <div class="status-pill">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">–</span>
      </div>
      <div class="status-pill" id="last-flag-pill" style="display:none;">
        <span id="last-flag-emoji" style="font-size:8px;"></span>
        <span id="last-flag-text" style="font-size:12px;font-weight:700;color:var(--text);"></span>
        <span id="last-flag-time" style="font-size:11px;color:var(--muted);"></span>
      </div>
    </div>
    <div class="widget-controls">
      <button class="ctrl-btn" id="btn-collapse" title="Collapse" onclick="toggleCollapse()">▲</button>
    </div>
  </div>

  <div class="widget-body">
    <!-- Disabled banner -->
    <div id="disabled-banner">
      <div class="err-title">Error</div>
      <div class="err-body">The webpage is currently disabled,<br>use the discord commands.</div>
    </div>

    <!-- Global -->
    <div>
      <div class="section-label">Global flags</div>
      <div class="flag-grid cols-2">
        <button class="flag-btn green"  onclick="triggerFlag('green',  event)"><span class="fi">🟢</span><span class="fn">Green</span></button>
        <button class="flag-btn red"    onclick="triggerFlag('red',    event)"><span class="fi">🔴</span><span class="fn">Red</span></button>
        <button class="flag-btn yellow" onclick="triggerFlag('yellow', event)"><span class="fi">🟡</span><span class="fn">Yellow</span></button>
        <button class="flag-btn yellow" onclick="triggerFlag('fcy',    event)"><span class="fi">🟡</span><span class="fn">FCY</span></button>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="section-label">Driver</div>
      <div class="flag-grid cols-2">
        <button class="flag-btn blue"  onclick="triggerFlag('blue',      event)"><span class="fi">🔵</span><span class="fn">Blue Flag</span></button>
        <button class="flag-btn white" onclick="triggerFlag('checkered', event)"><span class="fi">🏁</span><span class="fn">Checkered</span></button>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="section-label">Safety car</div>
      <div class="flag-grid cols-2">
        <button class="flag-btn orange" onclick="triggerFlag('safety_car', event)"><span class="fi">🟠</span><span class="fn">Deploy</span></button>
        <button class="flag-btn orange" onclick="triggerFlag('sc_ending',  event)"><span class="fi">🟠</span><span class="fn">Ending</span></button>
        <button class="flag-btn orange" onclick="triggerFlag('sc_speedup', event)"><span class="fi">🟠</span><span class="fn">Speed Up</span></button>
        <button class="flag-btn orange" onclick="triggerFlag('sfl',        event)"><span class="fi">🟠</span><span class="fn">SFL</span></button>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="section-label">Voice channels</div>
      <div class="flag-grid cols-2">
        <button class="flag-btn vc-join"  onclick="joinVCs(event)"><span class="fi">🎙️</span><span class="fn">Join VCs</span></button>
        <button class="flag-btn vc-leave" onclick="leaveVCs(event)"><span class="fi">🔌</span><span class="fn">Leave VCs</span></button>
      </div>
    </div>
  </div>
</div>

<div id="join-result"></div>
<div id="toast"></div>
<div id="cooldown-bar"><div id="cooldown-fill"></div></div>

<script>
  // ── CONFIG ────────────────────────────────────────────────────────────────
  const API_URL = "https://forgot-organizing-older-adam.trycloudflare.com";
  const CLIENT_ID     = "1467595519718195473";
  const REDIRECT_URI  = encodeURIComponent("https://race-control-one.vercel.app/callback");
  const DISCORD_OAUTH = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=code&scope=identify`;
  // ─────────────────────────────────────────────────────────────────────────

  let user      = null; // { id, username, avatar }
  let collapsed  = false;
  let toastTimer;
  let cooldown   = false;
  let cooldownTimer;
  let lastFlag   = null;

  // ── Check for OAuth callback code ─────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  const code   = params.get("code");

  if (code) {
    window.history.replaceState({}, document.title, "/");
    exchangeCode(code);
  } else {
    const saved = sessionStorage.getItem("rc_user");
    if (saved) {
      user = JSON.parse(saved);
      showPanel();
    }
  }

  function loginWithDiscord() {
    window.location.href = DISCORD_OAUTH;
  }

  async function exchangeCode(code) {
    document.getElementById("login-error").textContent = "Verifying your account...";
    try {
      const res = await fetch(`${API_URL}/auth`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code, redirectUri: "https://race-control-one.vercel.app/callback" }),
      });

      const data = await res.json();

      if (res.status === 403) {
        if (data.error && data.error.includes("blacklisted")) {
          document.getElementById("login-discord").style.display = "none";
          const bl = document.getElementById("login-blacklisted");
          bl.style.display = "flex";
          // Try to get username from the partial data
          const uname = data.username || "User";
          document.getElementById("blacklisted-username").textContent = uname;
        } else {
          document.getElementById("login-error").textContent = "❌ " + (data.error || "Access denied.");
        }
        return;
      }

      if (!res.ok) throw new Error(data.error || "Auth failed");

      // Role verified — now show password screen
      user = data.user;
      showPasswordScreen();

    } catch (err) {
      document.getElementById("login-error").textContent = `❌ ${err.message}`;
    }
  }

  function showPasswordScreen() {
    document.getElementById("login-discord").style.display = "none";
    const pwScreen = document.getElementById("login-password");
    pwScreen.style.display = "flex";

    // Show their Discord info
    document.getElementById("login-username").textContent = user.username;
    const avatarEl = document.getElementById("login-avatar");
    if (user.avatar) {
      avatarEl.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=32`;
    } else {
      avatarEl.src = `https://cdn.discordapp.com/embed/avatars/${parseInt(user.id) % 5}.png`;
    }

    document.getElementById("pw").focus();
    document.getElementById("pw").addEventListener("keydown", e => {
      if (e.key === "Enter") submitPassword();
    });
  }

  async function submitPassword() {
    const pw = document.getElementById("pw").value.trim();
    if (!pw) return;

    try {
      const res = await fetch(`${API_URL}/verify-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-discord-id": user.id, "x-discord-token": user.token },
        body: JSON.stringify({ password: pw }),
      });

      const data = await res.json();
      if (!res.ok) {
        document.getElementById("pw-error").textContent = "❌ " + (data.error || "Wrong password.");
        return;
      }

      // All good — save session and show panel
      sessionStorage.setItem("rc_user", JSON.stringify(user));
      showPanel();

    } catch (err) {
      document.getElementById("pw-error").textContent = `❌ ${err.message}`;
    }
  }

  async function showPanel() {
    document.getElementById("login-discord").style.display = "none";
    document.getElementById("login-password").style.display = "none";
    document.getElementById("widget").style.display = "block";

    // Set user info in header
    document.getElementById("user-name").textContent = user.username;
    if (user.avatar) {
      document.getElementById("user-avatar").src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=32`;
    } else {
      document.getElementById("user-avatar").src = `https://cdn.discordapp.com/embed/avatars/${parseInt(user.id) % 5}.png`;
    }

    // Check status
    try {
      const r = await fetch(`${API_URL}/status`, {
        headers: { "x-discord-id": user.id, "x-discord-token": user.token }
      });
      const d = await r.json();
      updateStatus(d.connected, d.vcs);
      showDisabledBanner(!d.webPanelEnabled);
    } catch { updateStatus(false, []); }

    pollStatus();
  }

  function pollStatus() {
    setInterval(async () => {
      try {
        const r = await fetch(`${API_URL}/status`, {
          headers: { "x-discord-id": user.id, "x-discord-token": user.token }
        });
        const d = await r.json();
        updateStatus(d.connected, d.vcs);
        showDisabledBanner(!d.webPanelEnabled);
      } catch { updateStatus(false, []); }
    }, 10_000);
  }

  function updateStatus(connected, vcs) {
    const dot  = document.getElementById("status-dot");
    const text = document.getElementById("status-text");
    if (connected) {
      dot.classList.add("live");
      text.textContent = `${(vcs || []).length} VC${(vcs || []).length !== 1 ? "s" : ""} live`;
    } else {
      dot.classList.remove("live");
      text.textContent = "Not in VCs";
    }
  }

  function showDisabledBanner(show) {
    document.getElementById("disabled-banner").style.display = show ? "flex" : "none";
  }

  async function triggerFlag(flag, e) {
    if (cooldown) { showToast("⏳ Wait 5 seconds!", "error"); return; }
    startCooldown();
    const btn = e?.currentTarget;
    if (btn) { btn.classList.remove("firing"); void btn.offsetWidth; btn.classList.add("firing"); setTimeout(() => btn.classList.remove("firing"), 300); }
    try {
      const res = await fetch(`${API_URL}/flag`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-discord-id": user.id, "x-discord-token": user.token },
        body: JSON.stringify({ flag, username: user.username, discordId: user.id }),
      });
      const data = await res.json();
      if (res.ok) {
        showToast(`✓ ${flagName(flag)}`, "success");
        setLastFlag(flagName(flag));
      }
      else if (res.status === 403) showToast("✗ Web panel disabled", "error");
      else showToast(`✗ ${data.error}`, "error");
    } catch { showToast("✗ Bot unreachable", "error"); }
  }

  async function joinVCs(e) {
    if (cooldown) { showToast("⏳ Wait 5 seconds!", "error"); return; }
    startCooldown();
    const btn = e?.currentTarget;
    if (btn) { btn.classList.remove("firing"); void btn.offsetWidth; btn.classList.add("firing"); setTimeout(() => btn.classList.remove("firing"), 300); }
    try {
      const res = await fetch(`${API_URL}/join`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-discord-id": user.id, "x-discord-token": user.token },
        body: JSON.stringify({ username: user.username, discordId: user.id }),
      });
      const data = await res.json();
      if (res.ok) {
        const servers = (data.servers || []).map(s => `✅ ${s.name} — ${s.guild}`).join("\n") || "✅ Joined";
        showToast("✓ Joined VCs!", "success");
        updateStatus(true, data.servers || []);
        showJoinResult(servers);
      } else showToast(`✗ ${data.error}`, "error");
    } catch { showToast("✗ Bot unreachable", "error"); }
  }

  async function leaveVCs(e) {
    if (cooldown) { showToast("⏳ Wait 5 seconds!", "error"); return; }
    startCooldown();
    const btn = e?.currentTarget;
    if (btn) { btn.classList.remove("firing"); void btn.offsetWidth; btn.classList.add("firing"); setTimeout(() => btn.classList.remove("firing"), 300); }
    try {
      const res = await fetch(`${API_URL}/leave`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-discord-id": user.id, "x-discord-token": user.token },
        body: JSON.stringify({ username: user.username, discordId: user.id }),
      });
      const data = await res.json();
      if (res.ok) { showToast("✓ Left all VCs", "success"); updateStatus(false, []); }
      else showToast(`✗ ${data.error}`, "error");
    } catch { showToast("✗ Bot unreachable", "error"); }
  }

  function flagName(f) {
    return { green:"Green Flag", yellow:"Yellow Flag", fcy:"Full Course Yellow",
             red:"Red Flag", blue:"Blue Flag", safety_car:"SC Deployed",
             sc_ending:"SC Ending", sc_speedup:"SC Speed Up",
             sfl:"Single File Line", checkered:"Checkered Flag" }[f] || f;
  }

  function toggleCollapse() {
    collapsed = !collapsed;
    document.getElementById("widget").classList.toggle("collapsed", collapsed);
    document.getElementById("btn-collapse").textContent = collapsed ? "▼" : "▲";
  }

  const FLAG_EMOJIS = {
    "Green Flag": "🟢", "Yellow Flag": "🟡", "Full Course Yellow": "🟡",
    "Red Flag": "🔴", "Blue Flag": "🔵", "SC Deployed": "🟠",
    "SC Ending": "🟠", "SC Speed Up": "🟠", "Single File Line": "🟠",
    "Checkered Flag": "🏁",
  };

  let lastFlagTime   = null;
  let lastFlagInterval = null;

  function setLastFlag(name) {
    lastFlag     = name;
    lastFlagTime = Date.now();

    const pill  = document.getElementById("last-flag-pill");
    const emoji = document.getElementById("last-flag-emoji");
    const text  = document.getElementById("last-flag-text");
    if (!pill || !text) return;

    emoji.textContent = FLAG_EMOJIS[name] || "🏁";
    text.textContent  = `Last: ${name}`;
    pill.style.display = "flex";

    // Clear any existing timer
    if (lastFlagInterval) clearInterval(lastFlagInterval);

    // Update time ago every second
    updateTimeAgo();
    lastFlagInterval = setInterval(updateTimeAgo, 1000);
  }

  function updateTimeAgo() {
    if (!lastFlagTime) return;
    const el = document.getElementById("last-flag-time");
    if (!el) return;
    const secs = Math.floor((Date.now() - lastFlagTime) / 1000);
    if (secs < 60)      el.textContent = `— ${secs}s ago`;
    else if (secs < 3600) el.textContent = `— ${Math.floor(secs / 60)}m ${secs % 60}s ago`;
    else                el.textContent = `— ${Math.floor(secs / 3600)}h ${Math.floor((secs % 3600) / 60)}m ago`;
  }

  function startCooldown() {
    cooldown = true;
    clearTimeout(cooldownTimer);
    showCooldownBar();
    cooldownTimer = setTimeout(() => {
      cooldown = false;
      hideCooldownBar();
    }, 5000);
  }

  function showCooldownBar() {
    const bar = document.getElementById("cooldown-bar");
    const fill = document.getElementById("cooldown-fill");
    if (!bar || !fill) return;
    bar.style.display = "block";
    fill.style.transition = "none";
    fill.style.width = "100%";
    // Trigger reflow
    void fill.offsetWidth;
    fill.style.transition = "width 5s linear";
    fill.style.width = "0%";
  }

  function hideCooldownBar() {
    const bar = document.getElementById("cooldown-bar");
    if (bar) bar.style.display = "none";
  }

  function showJoinResult(text) {
    const el = document.getElementById("join-result");
    el.textContent = text;
    el.style.display = "block";
    setTimeout(() => { el.style.display = "none"; }, 4000);
  }

  function showToast(msg, type = "") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ""; }, 2000);
  }
</script>
</body>
</html>
