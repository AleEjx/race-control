<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0c10;
      --surface: #13131a;
      --border:  #1f1f2e;
      --text:    #e8e8f0;
      --muted:   #50506a;
      --green:   #00e676;
      --yellow:  #ffd600;
      --red:     #ff1744;
      --blue:    #2979ff;
      --orange:  #ff6d00;
      --white:   #ffffff;
      --radius:  5px;
    }

    html, body {
      background: transparent;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* ─── LOGIN ─────────────────────────────────────────────────────── */
    #login {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      background: var(--bg);
      border-radius: 12px;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--white);
      letter-spacing: 1px;
    }
    .logo span { color: var(--red); }

    input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      padding: 9px 12px;
      border-radius: var(--radius);
      outline: none;
    }
    input[type="password"]:focus { border-color: var(--red); }

    .login-btn {
      width: 100%;
      background: var(--red);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      padding: 9px;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-error { color: var(--red); font-size: 11px; min-height: 14px; text-align: center; }

    /* ─── WIDGET ─────────────────────────────────────────────────────── */
    #widget {
      display: none;
      position: fixed;
      top: 12px;
      right: 12px;
      width: 240px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      font-family: 'Barlow Condensed', sans-serif;
      user-select: none;
    }

    /* collapsed state */
    #widget.collapsed .widget-body { display: none; }

    /* ── Widget header ── */
    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      cursor: move;
      gap: 8px;
    }

    .widget-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .widget-logo {
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .widget-logo span { color: var(--red); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.live { background: var(--green); box-shadow: 0 0 5px var(--green); }

    .widget-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 3px 5px;
      border-radius: 3px;
      font-size: 13px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
    }
    .ctrl-btn:hover { color: var(--text); background: var(--border); }

    /* ── Widget body ── */
    .widget-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .flag-grid {
      display: grid;
      gap: 5px;
    }
    .flag-grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .flag-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

    .flag-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.1s, border-color 0.15s;
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .flag-btn:active { transform: scale(0.93); }

    .flag-btn .fi { font-size: 16px; line-height: 1; }
    .flag-btn .fn {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
    }

    .flag-btn.green:hover  { border-color: var(--green);  background: rgba(0,230,118,0.08); }
    .flag-btn.yellow:hover { border-color: var(--yellow); background: rgba(255,214,0,0.08); }
    .flag-btn.red:hover    { border-color: var(--red);    background: rgba(255,23,68,0.08); }
    .flag-btn.blue:hover   { border-color: var(--blue);   background: rgba(41,121,255,0.08); }
    .flag-btn.orange:hover { border-color: var(--orange); background: rgba(255,109,0,0.08); }
    .flag-btn.white:hover  { border-color: var(--white);  background: rgba(255,255,255,0.05); }

    .flag-btn.firing { animation: pop 0.25s ease; }
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.88); }
      100% { transform: scale(1); }
    }

    .divider { height: 1px; background: var(--border); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 7px 16px;
      border-radius: 20px;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
      opacity: 0;
      white-space: nowrap;
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red); }

    /* ─── POPOUT MODE ────────────────────────────────────────────────── */
    body.popout {
      background: var(--bg);
      overflow: auto;
    }
    body.popout #widget {
      position: relative;
      top: auto; right: auto;
      width: 100%;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }
    body.popout #widget.collapsed .widget-body { display: flex; }
    body.popout .widget-header { cursor: default; }
    body.popout #btn-collapse,
    body.popout #btn-popout { display: none; }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login">
  <div class="logo">Race<span>Control</span></div>
  <input type="password" id="pw" placeholder="Password" />
  <button class="login-btn" onclick="login()">Enter</button>
  <div class="login-error" id="login-error"></div>
</div>

<!-- ── Widget ── -->
<div id="widget">
  <div class="widget-header" id="drag-handle">
    <div class="widget-header-left">
      <div class="widget-logo">Race<span>Control</span></div>
      <div class="status-pill">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">–</span>
      </div>
    </div>
    <div class="widget-controls">
      <button class="ctrl-btn" id="btn-popout" title="Pop out" onclick="popOut()">⤢</button>
      <button class="ctrl-btn" id="btn-collapse" title="Collapse" onclick="toggleCollapse()">▲</button>
    </div>
  </div>

  <div class="widget-body">
    <!-- Global -->
    <div>
      <div class="section-label">Global</div>
      <div class="flag-grid cols-2">
        <button class="flag-btn green"  onclick="triggerFlag('green',  event)"><span class="fi">🟢</span><span class="fn">Green</span></button>
        <button class="flag-btn red"    onclick="triggerFlag('red',    event)"><span class="fi">🔴</span><span class="fn">Red</span></button>
        <button class="flag-btn yellow" onclick="triggerFlag('yellow', event)"><span class="fi">🟡</span><span class="fn">Yellow</span></button>
        <button class="flag-btn yellow" onclick="triggerFlag('fcy',    event)"><span class="fi">🟡</span><span class="fn">FCY</span></button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Driver -->
    <div>
      <div class="section-label">Driver</div>
      <div class="flag-grid cols-2">
        <button class="flag-btn blue"  onclick="triggerFlag('blue',      event)"><span class="fi">🔵</span><span class="fn">Blue Flag</span></button>
        <button class="flag-btn white" onclick="triggerFlag('checkered', event)"><span class="fi">🏁</span><span class="fn">Checkered</span></button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Safety Car -->
    <div>
      <div class="section-label">Safety Car</div>
      <div class="flag-grid cols-2">
        <button class="flag-btn orange" onclick="triggerFlag('safety_car', event)"><span class="fi">🟠</span><span class="fn">Deploy</span></button>
        <button class="flag-btn orange" onclick="triggerFlag('sc_ending',  event)"><span class="fi">🟠</span><span class="fn">Ending</span></button>
        <button class="flag-btn orange" onclick="triggerFlag('sc_speedup', event)"><span class="fi">🟠</span><span class="fn">Speed Up</span></button>
        <button class="flag-btn orange" onclick="triggerFlag('sfl',        event)"><span class="fi">🟠</span><span class="fn">SFL</span></button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── CONFIGURE ────────────────────────────────────────────────────────────
  const API_URL = "https://customs-seeking-zinc-pork.trycloudflare.com"; // e.g. http://123.456.789.0:3000
  // ────────────────────────────────────────────────────────────────────────

  let password = "";
  let collapsed = false;

  const isPopout = new URLSearchParams(location.search).has("popout");
  if (isPopout) document.body.classList.add("popout");

  document.getElementById("pw").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });

  async function login() {
    const input = document.getElementById("pw").value.trim();
    if (!input) return;
    password = input;

    try {
      const res = await fetch(`${API_URL}/status`, {
        headers: { "x-password": password }
      });

      if (res.status === 401) {
        document.getElementById("login-error").textContent = "Wrong password.";
        password = "";
        return;
      }

      const data = await res.json();
      document.getElementById("login").style.display = "none";
      document.getElementById("widget").style.display = "block";
      updateStatus(data.connected, data.vcs);
      pollStatus();

    } catch {
      document.getElementById("login-error").textContent = "Can't reach bot.";
    }
  }

  function pollStatus() {
    setInterval(async () => {
      try {
        const r = await fetch(`${API_URL}/status`, { headers: { "x-password": password } });
        const d = await r.json();
        updateStatus(d.connected, d.vcs);
      } catch { updateStatus(false, []); }
    }, 10_000);
  }

  function updateStatus(connected, vcs) {
    const dot  = document.getElementById("status-dot");
    const text = document.getElementById("status-text");
    if (connected) {
      dot.classList.add("live");
      text.textContent = `${vcs.length} VC${vcs.length !== 1 ? "s" : ""} live`;
    } else {
      dot.classList.remove("live");
      text.textContent = "Not in VCs";
    }
  }

  async function triggerFlag(flag, e) {
    const btn = e?.currentTarget;
    if (btn) {
      btn.classList.remove("firing");
      void btn.offsetWidth;
      btn.classList.add("firing");
      setTimeout(() => btn.classList.remove("firing"), 300);
    }

    try {
      const res = await fetch(`${API_URL}/flag`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-password": password },
        body: JSON.stringify({ flag }),
      });
      const data = await res.json();
      if (res.ok) showToast(`✓ ${flagName(flag)}`, "success");
      else        showToast(`✗ ${data.error}`,     "error");
    } catch {
      showToast("✗ Bot unreachable", "error");
    }
  }

  function flagName(f) {
    return { green:"Green Flag", yellow:"Yellow Flag", fcy:"Full Course Yellow",
             red:"Red Flag", blue:"Blue Flag", safety_car:"SC Deployed",
             sc_ending:"SC Ending", sc_speedup:"SC Speed Up",
             sfl:"Single File Line", checkered:"Checkered Flag" }[f] || f;
  }

  function toggleCollapse() {
    collapsed = !collapsed;
    const w = document.getElementById("widget");
    const b = document.getElementById("btn-collapse");
    w.classList.toggle("collapsed", collapsed);
    b.textContent = collapsed ? "▼" : "▲";
  }

  function popOut() {
    const url = location.href.includes("?")
      ? location.href + "&popout"
      : location.href + "?popout";
    // Try popup first, fall back to new tab
    const popup = window.open(url, "RaceControl", "width=260,height=460,resizable=yes");
    if (!popup || popup.closed || typeof popup.closed === "undefined") {
      window.open(url, "_blank");
    }
  }

  // ── Drag to reposition (widget mode only) ──────────────────────────────
  if (!isPopout) {
    const handle = document.getElementById("drag-handle");
    const widget = document.getElementById("widget");
    let dragging = false, ox = 0, oy = 0;

    handle.addEventListener("mousedown", e => {
      if (e.target.closest(".ctrl-btn")) return;
      dragging = true;
      const r = widget.getBoundingClientRect();
      ox = e.clientX - r.left;
      oy = e.clientY - r.top;
      widget.style.transition = "none";
    });

    document.addEventListener("mousemove", e => {
      if (!dragging) return;
      widget.style.right = "auto";
      widget.style.left  = (e.clientX - ox) + "px";
      widget.style.top   = (e.clientY - oy) + "px";
    });

    document.addEventListener("mouseup", () => { dragging = false; });
  }

  // ── Toast ───────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = "") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ""; }, 2000);
  }
</script>
</body>
</html>
